<!DOCTYPE html>
<html>
<head>
  <style>body { margin: 0; background: #000; }</style>
</head>
<body>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="50%" stop-color="#FFC94D"/>
      <stop offset="100%" stop-color="#FF9A3D"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0A0A0A"/>

  <!-- 辅助细线 -->
  <path d="M 0 620 
           C 200 620, 250 480, 350 480
           C 450 480, 450 620, 550 620
           C 650 620, 700 250, 750 250
           C 800 250, 800 820, 900 820
           C 1000 820, 1050 450, 1150 450
           C 1250 450, 1300 580, 1400 580
           C 1500 580, 1500 520, 1600 520"
        fill="none" stroke="url(#g)" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
        
  <path d="M 0 580 
           C 200 580, 250 520, 350 520
           C 450 520, 450 580, 550 580
           C 650 580, 680 150, 730 150
           C 780 150, 850 880, 950 880
           C 1050 880, 1050 350, 1150 350
           C 1250 350, 1300 620, 1400 620
           C 1500 620, 1500 480, 1600 480"
        fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>

  <!-- 主波 -->
  <path d="M 0 600 
           C 200 600, 300 500, 400 500
           C 500 500, 500 600, 600 600
           C 650 600, 700 200, 750 200
           C 800 200, 850 850, 900 850
           C 950 850, 1000 450, 1050 450
           C 1100 450, 1120 564, 1160 564"
        fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 飞鸟 -->
  <g transform="translate(1160, 418) scale(1.2) rotate(-15)" fill="none" stroke="url(#g)" stroke-width="5" filter="url(#glow)" stroke-linejoin="round">
    <path d="M 0 150 
             C 30 160, 60 160, 90 130
             C 110 110, 120 100, 130 90
             C 120 85, 110 85, 100 85
             C 80 80, 50 30, 30 -20
             C 50 30, 80 60, 110 70
             C 150 50, 190 40, 230 40
             C 190 60, 150 75, 130 85
             C 140 110, 120 150, 80 170
             C 40 180, 10 165, 0 150 Z" />
  </g>

  <!-- 音符装饰 -->
  <g stroke="url(#g)" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.8">
    <path d="M350 420 l0 -30 l20 -10 l0 30" />
    <circle cx="348" cy="420" r="8" fill="url(#g)"/>
    <circle cx="368" cy="410" r="8" fill="url(#g)"/>
    <path d="M550 500 l0 -40" />
    <circle cx="546" cy="502" r="10" fill="url(#g)"/>
    <path d="M850 650 l0 -30 l15 -5 l0 25" />
    <circle cx="848" cy="650" r="6" fill="url(#g)"/>
    <circle cx="863" cy="645" r="6" fill="url(#g)"/>
  </g>
  
  <!-- 粒子 -->
  <g fill="url(#g)" opacity="0.8" filter="url(#glow)">
    <circle cx="200" cy="550" r="2.5" />
    <circle cx="250" cy="620" r="1.5" />
    <circle cx="350" cy="450" r="2" />
    <circle cx="450" cy="550" r="3" />
    <circle cx="600" cy="650" r="2.5" />
    <circle cx="680" cy="300" r="2" />
    <circle cx="750" cy="150" r="3.5" />
    <circle cx="800" cy="400" r="1.5" />
    <circle cx="850" cy="800" r="2.5" />
    <circle cx="950" cy="900" r="3" />
    <circle cx="1050" cy="700" r="2" />
    <circle cx="1100" cy="350" r="2.5" />
    <circle cx="1200" cy="300" r="3" />
    <circle cx="1300" cy="550" r="1.5" />
    <circle cx="1400" cy="650" r="2.5" />
    <circle cx="1500" cy="500" r="2" />
    <circle cx="1550" cy="620" r="3" />
    <circle cx="1650" cy="400" r="2.5" />
    <circle cx="1750" cy="300" r="3" />
    <circle cx="1800" cy="520" r="2" />
    <circle cx="1850" cy="450" r="2.5" />
  </g>
</svg>
</body>
</html>
