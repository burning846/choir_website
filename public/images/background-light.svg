  <g transform="translate(920, 418) scale(1) rotate(-15)" fill="none" stroke="url(#g2)" stroke-width="6" filter="url(#softGlow)" stroke-linejoin="round">
    <path d="M 0 150 
             C 30 160, 60 160, 90 130
             C 110 110, 120 100, 130 90
             C 120 85, 110 85, 100 85
