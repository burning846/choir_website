<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C07A00"/>
      <stop offset="50%" stop-color="#E8B74A"/>
      <stop offset="100%" stop-color="#B56A00"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#FAFAF7"/>
  <rect width="100%" height="100%" fill="url(#gradBg)" opacity="0.0"/>
  <ellipse cx="960" cy="560" rx="470" ry="160" fill="#F9E7C2" opacity="0.35" filter="url(#softGlow)"/>

  <!-- 声波 -->
  <path d="M120 560 C260 520, 320 420, 420 560
           S 620 700, 720 560
           S 880 360, 960 560
           S 1120 780, 1200 560
           S 1360 420, 1480 520
           S 1600 600, 1800 560"
        fill="none" stroke="url(#g2)" stroke-width="6" filter="url(#softGlow)"/>

  <!-- 鸟轮廓 -->
  <path d="M1320 500
           c 40 -30, 90 -40, 130 -15
           c 10 -30, 40 -55, 70 -58
           c -20 25,-25 55,-15 85
           c -25 -10,-55 -8,-85 10
           c -30 18,-60 30,-100 30
           c 20 -20, 20 -35, 0 -52 z"
        fill="none" stroke="url(#g2)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

  <!-- 轻粒子 -->
  <g opacity="0.5" fill="#D8AE52" filter="url(#softGlow)">
    <circle cx="360" cy="520" r="2"/>
    <circle cx="520" cy="600" r="2"/>
    <circle cx="820" cy="520" r="1.8"/>
    <circle cx="1130" cy="640" r="2"/>
    <circle cx="1460" cy="500" r="1.8"/>
  </g>
</svg>
