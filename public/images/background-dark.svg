<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB84D"/>
      <stop offset="50%" stop-color="#FFC94D"/>
      <stop offset="100%" stop-color="#FF9A3D"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vignette">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="70%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#vignette)"/>

  <!-- 聚光效果 -->
  <ellipse cx="960" cy="560" rx="420" ry="140" fill="#E7A93A" opacity="0.12" filter="url(#glow)"/>

  <!-- 金色粒子 -->
  <g opacity="0.7" fill="url(#g)" filter="url(#glow)">
    <circle cx="350" cy="520" r="2"/>
    <circle cx="410" cy="470" r="1.6"/>
    <circle cx="500" cy="610" r="2.4"/>
    <circle cx="720" cy="540" r="1.8"/>
    <circle cx="820" cy="470" r="1.2"/>
    <circle cx="1030" cy="640" r="2.2"/>
    <circle cx="1220" cy="520" r="1.4"/>
    <circle cx="1380" cy="480" r="1.8"/>
    <circle cx="1500" cy="560" r="2.2"/>
  </g>

  <!-- 律动声波 -->
  <path d="M120 560 C260 520, 320 420, 420 560
           S 620 700, 720 560
           S 880 360, 960 560
           S 1120 780, 1200 560
           S 1360 420, 1480 520
           S 1600 600, 1800 560"
        fill="none" stroke="url(#g)" stroke-width="6" filter="url(#glow)"/>

  <!-- 鸟轮廓（与声波尾部衔接） -->
  <path d="M1320 500
           c 40 -30, 90 -40, 130 -15
           c 10 -30, 40 -55, 70 -58
           c -20 25,-25 55,-15 85
           c -25 -10,-55 -8,-85 10
           c -30 18,-60 30,-100 30
           c 20 -20, 20 -35, 0 -52 z"
        fill="none" stroke="url(#g)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- 音符装饰 -->
  <g stroke="url(#g)" stroke-width="4" fill="none" filter="url(#glow)" opacity="0.9">
    <path d="M500 480 l0 -40" />
    <circle cx="500" cy="500" r="10" fill="url(#g)"/>
    <path d="M660 520 l0 -34" />
    <circle cx="660" cy="538" r="9" fill="url(#g)"/>
  </g>
</svg>